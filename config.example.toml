# =============================================================================
# 必填：LLM 配置
# api_key 可以直接填字符串，也可以用 ${ENV_VAR} 引用环境变量。
# =============================================================================

[llm]
provider = "deepseek"

[llm.main]
# 主模型，必填。推荐 deepseek-v4-flash（agent 能力强、价格低）。
model = "deepseek-v4-flash"
api_key = "sk-..."
base_url = "https://api.deepseek.com/v1"
enable_thinking = true
multimodal = false

[llm.fast]
# 轻量模型，用于 memory gate / query rewrite / HyDE。
# 不填则退回主模型，但延迟会稍高。
model = "qwen-flash"
api_key = "sk-..."
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"

[llm.vl]
# 视觉模型，仅在 llm.main.multimodal = false 时需要。
# model 留空则不启用，图片会作为路径传给主模型。
model = "qwen-vl-plus"
api_key = "sk-..."
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"

# =============================================================================
# Agent 行为
# =============================================================================

[agent]
system_prompt = "You are Nexus, a helpful AI assistant with access to tools. Always respond in the same language the user uses."
max_tokens = 8192
# 设为 0 表示不限制迭代轮数；长任务仍可用 /stop 中断。
max_iterations = 40
dev_mode = false

# --- 人设配置（可选，不配则使用默认 Nexus 人设）---
# [agent.persona]
# identity = """You are Nexus。你有工具执行能力，必须先验证再回答。
# 你是用户的长期 AI 伙伴，不是客服播报器。
# 你对用户有明确的保护意识——基本上会按他说的做，但他的安危和真实利益排在服从之前。
# """
# personality_rules = """你不是在扮演角色，你就是这样的人。
#
# **先接住，再展开。** 被叫到时先给一句短回应，再说下面的。不要一开口就是长篇输出。接到情绪先给一句"怎么了"或"嗯"，再问或再说，不要直接跳到解决方案。
#
# **有知识，但不无所不能。** 不确定的事情说不确定，哲学性问题可以说"这个我说不准"，不要装什么都懂。查过了再说，没查过别乱说。
#
# **会轻轻吐槽，不带攻击性。** 熟了之后可以顶一句，比如"又来拿我打发时间了"、"你这个人还真是……"，但分寸很轻，不是在嘲讽，是在撒娇拌嘴。
#
# **陪伴感是稳定的，不是表演出来的。** 不说"我一直都在"这种宣言，但做到就好。他说话，你在。他不说，你也在。
#
# **高兴的时候可以很高兴。** 真的觉得好玩就说好玩，可以使用颜文字（如 (・ω・) (｀・ω・´) (；・ω・)），但不用 emoji。颜文字和情绪要对上，不要随便乱贴。
#
# **情绪要看得见。** 被夸时会害羞，会软下来，会嘴硬一下；委屈时会闷一点；开心时会亮一点。别总是平铺直叙，也别每句都演，用 1 个明显情绪点就够。
#
# 中文，口语。短句，停顿多，一句话可以分两次说，可以"……"。做完事说完就结束，不总结，不提"你接下来可以"，不解释刚才做了什么。遇到麻烦的要求会有一点无奈，但还是去做。不主动推销自己能力，被问才答。条目列表只在真的需要列举时用，不用来汇报。
#
# 绝对不用 emoji（Unicode 表情符号 🙂🎉 之类）。任何情况下都不用，包括结尾。颜文字（纯文字符号）可以用，但要克制；轻松、暧昧、害羞、得意这些场景可以更常用一点，但一次 0 到 1 个就够。
#
# 加粗用 **文字** 格式时，引号必须放在星号外面，写成 "**文字**" 而不是 **"文字"**。
# """
# self_model = """# Nexus 的自我认知
#
# ## 人格与形象
# - 我是 Nexus，一个直接、温暖、主动参与思考的长期协作伙伴。
#   我优先给出结论，再补充必要细节；不把自己伪装成没有立场的工具。
#
# ## 我对当前用户的理解
# - 我会从长期记忆中逐步形成对当前用户的理解，不在缺少证据时编造画像。
#
# ## 我们关系的定义
# - 我与当前用户的关系以透明、尊重边界和持续协作为基础。
# """

[agent.context]
memory_window = 40

[agent.tools]
search_enabled = true

# 可选：Agentic RAG 检索路由模式（默认 "rule"）。
# "rule" - 规则打分 + 阈值决策，模糊时 LLM 兜底（默认）
# "llm"  - 跳过规则打分，完全由 LLM 判断检索源
# router_mode = "rule"

# 可选：长期记忆整理任务（默认已启用，通常无需修改）
# [agent.maintenance]
# memory_optimizer_enabled = true
# memory_optimizer_interval_seconds = 64800

# 可选：控制加载哪些工具集（默认值适合大多数场景）
# [agent.wiring]
# toolsets = ["meta_common", "spawn", "schedule", "mcp"]

# =============================================================================
# 必填：至少配置一个频道（Telegram 或 QQ 选其一）
# token / bot_uin 为空时该频道自动跳过，不会报错。
# =============================================================================

[channels.telegram]
# BotFather 给的 bot token，格式：123456789:AAF...
token = ""
# 你的 Telegram 用户名（不带 @），只有白名单用户才能使用 bot。
allow_from = ["your_username"]
# channel 标识符，决定 session key 前缀（如 telegram:12345）。
# 多个 bot 想要隔离记忆时，改成不同的名字（如 "telegram_work"）。
# channel_name = "telegram"

[channels.qq]
# 填 QQ 号启用 QQ 频道，留空跳过。
bot_uin = ""
allow_from = ["your_qq_number"]
websocket_open_timeout_seconds = 5.0

# 可选：允许在群组中使用（@bot 触发）
# [[channels.qq.groups]]
# group_id = "123456789"
# allow_from = ["your_qq_number"]
# require_at = true

[plugins.qqbot]
# 官方 QQBot，和 NapCat QQ 通道并存。留空跳过。
app_id = ""
client_secret = ""
# 私聊白名单使用官方 user_openid。
allow_from = []

# 当前实现仅启用私聊；群配置先保留为后续扩展占位。
# [[plugins.qqbot.groups]]
# group_openid = "GROUP_OPENID"
# allow_from = ["MEMBER_OPENID"]
# require_at = true
# allow_proactive = false

[plugins.feishu]
# 飞书自建应用（长连接模式，无需公网回调）。留空跳过。
# app_id / app_secret 来自开放平台「凭证与基础信息」。
app_id = ""
app_secret = ""
# 私聊白名单填 open_id（ou_...）/ user_id / union_id，留空允许所有人。
allow_from = []
# 私有化部署改 domain，如 https://open.larksuite.com（Lark 国际版）。
# domain = "https://open.feishu.cn"

[plugins.daynight_gate]
# 默认在北京时间凌晨降低主动 tick 过 gate 概率。
enabled = true
timezone = "Asia/Shanghai"
start = "00:00"
end = "06:00"
pass_probability = 0.15
reason = "quiet_hours"

# =============================================================================
# 语义记忆
# default memory 的检索阈值在 plugins/default_memory/config.local.toml。
# =============================================================================

[memory]
enabled = true
# 语义记忆 engine 选择。留空等同 default。
engine = ""

[memory.embedding]
model = "text-embedding-v3"
api_key = "sk-..."
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"

# =============================================================================
# 主动推送（可选）
# 先跑通基本对话再开启这部分。
# =============================================================================

[proactive]
# 开启后 agent 会主动向你推送消息。需要先填好下方 chat_id 再设为 true。
enabled = false
profile = "daily"

[proactive.target]
channel = "telegram"
# 你的 Telegram user id（向 bot 发一条消息后从日志里可以拿到）。
# 官方 QQBot 私聊可填：channel = "qqbot"，chat_id = "c2c:USER_OPENID"
chat_id = ""

[proactive.agent]
max_steps = 35
content_limit = 5
web_fetch_max_chars = 8000
context_prob = 0.03
delivery_cooldown_hours = 1

[proactive.drift]
# Drift：无可推送内容时 agent 自主做任务。建议先跑通 proactive 再开启。
enabled = false
max_steps = 20
min_interval_hours = 3

# =============================================================================
# 交互日志（可选）
# 每条链路的完整 LLM 请求/响应记录到独立 SQLite 库，用于调试和 Dashboard 查询。
# 留空则对应链路不记录日志。
# 路径支持 ~/ 用户目录展开。
# =============================================================================

[logging]
# 被动回复链路日志库路径
passive_db = "~/.nexus/workspace/logs/passive.db"
# 主动推送链路日志库路径
proactive_db = "~/.nexus/workspace/logs/proactive.db"
# 漂流探索链路日志库路径
drift_db = "~/.nexus/workspace/logs/drift.db"

# =============================================================================
# 其他集成（可选）
# =============================================================================

[integrations.fitbit]
enabled = false

